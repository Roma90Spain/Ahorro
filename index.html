<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ahorro en Pareja</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
    padding: 20px;
}
.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 380px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
}
button {
    padding: 10px;
    width: 100%;
    margin-top: 5px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
}
.calc { background: #007bff; color: white; }
.save { background: #28a745; color: white; }
.reset { background: #dc3545; color: white; }

.resultado {
    margin-top: 15px;
    font-weight: bold;
}
.historial {
    margin-top: 20px;
    text-align: left;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="box">
<h2>💰 Ahorro en Pareja</h2>

<input type="number" id="tuSueldo" placeholder="Tu sueldo (€)">
<input type="number" id="sueldoPareja" placeholder="Sueldo pareja (€)">
<input type="number" id="ahorro" placeholder="Ahorro objetivo (€)">
<input type="month" id="mes">

<button class="calc" onclick="calcular()">Calcular</button>
<button class="save" onclick="guardar()">Guardar mes</button>
<button class="reset" onclick="resetear()">Reset</button>

<div class="resultado" id="resultado"></div>

<div class="historial" id="historial"></div>
</div>

<script>
let ultimoCalculo = null;

function calcular() {
    let tu = parseFloat(document.getElementById("tuSueldo").value);
    let pareja = parseFloat(document.getElementById("sueldoPareja").value);
    let ahorro = parseFloat(document.getElementById("ahorro").value);
    let mes = document.getElementById("mes").value;

    let resultadoDiv = document.getElementById("resultado");

    if (!tu || !pareja || !ahorro) {
        resultadoDiv.innerHTML = "⚠️ Rellena todos los campos";
        return;
    }

    let total = tu + pareja;

    let tuAportas = ahorro * (tu / total);
    let parejaAporta = ahorro * (pareja / total);

    if (tuAportas > tu || parejaAporta > pareja) {
        resultadoDiv.innerHTML = "❌ Ahorro demasiado alto";
        return;
    }

    let tuPorcentaje = (tu / total) * 100;
    let parejaPorcentaje = (pareja / total) * 100;

    ultimoCalculo = {
        mes: mes,
        tuAportas: tuAportas,
        parejaAporta: parejaAporta
    };

    resultadoDiv.innerHTML = `
        Tú: ${tuAportas.toFixed(2)}€ (${tuPorcentaje.toFixed(1)}%)<br>
        Pareja: ${parejaAporta.toFixed(2)}€ (${parejaPorcentaje.toFixed(1)}%)
    `;
}

function guardar() {
    if (!ultimoCalculo || !ultimoCalculo.mes) {
        alert("⚠️ Calcula y selecciona un mes primero");
        return;
    }

    let datos = JSON.parse(localStorage.getItem("ahorros")) || [];

    datos.push(ultimoCalculo);

    localStorage.setItem("ahorros", JSON.stringify(datos));

    mostrarHistorial();
}

function resetear() {
    if (confirm("¿Seguro que quieres borrar todos los datos?")) {
        localStorage.clear(); // 🔥 más fiable
        document.getElementById("resultado").innerHTML = "";
        mostrarHistorial();
    }
}

function mostrarHistorial() {
    let datos = JSON.parse(localStorage.getItem("ahorros")) || [];

    let html = "<h3>📊 Historial</h3>";

    let totalTu = 0;
    let totalPareja = 0;

    datos.forEach(d => {
        html += `
        ${d.mes} → Tú: ${d.tuAportas.toFixed(2)}€ | Pareja: ${d.parejaAporta.toFixed(2)}€<br>
        `;
        totalTu += d.tuAportas;
        totalPareja += d.parejaAporta;
    });

    html += `<br><b>💰 Ahorro anual:</b><br>
    Tú: ${totalTu.toFixed(2)}€<br>
    Pareja: ${totalPareja.toFixed(2)}€<br>
    Total: ${(totalTu + totalPareja).toFixed(2)}€`;

    document.getElementById("historial").innerHTML = html;
}

// cargar al abrir
mostrarHistorial();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
