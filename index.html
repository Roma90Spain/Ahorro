<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahorro en Pareja</title>

<style>
body {
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
    padding:10px;
}

.box {
    background:white;
    padding:15px;
    border-radius:10px;
    max-width:400px;
    margin:auto;
}

input, button {
    width:100%;
    padding:12px;
    margin:5px 0;
    font-size:16px;
}

button {border:none;border-radius:5px;}

.calc{background:#007bff;color:white;}
.save{background:#28a745;color:white;}
.reset{background:#dc3545;color:white;}
.export{background:#6c757d;color:white;}

canvas{
    width:100%;
    max-width:250px;
    display:block;
    margin:15px auto;
}
</style>
</head>

<body>

<div class="box">

<h2>💰 Ahorro en Pareja</h2>

<input id="nombre1" placeholder="Nombre 1">
<input id="nombre2" placeholder="Nombre 2">

<input type="number" id="tuSueldo" placeholder="Sueldo 1">
<input type="number" id="sueldoPareja" placeholder="Sueldo 2">
<input type="number" id="ahorro" placeholder="Ahorro objetivo">
<input type="month" id="mes">

<button class="calc" onclick="calcular()">Calcular</button>
<button class="save" onclick="guardar()">Guardar mes</button>
<button class="reset" onclick="resetear()">Reset</button>
<button class="export" onclick="exportar()">Exportar Excel</button>

<input type="file" onchange="importar()">

<div id="resultado"></div>

<canvas id="grafico" width="200" height="200"></canvas>

<div id="historial"></div>

</div>

<script>

let ultimoCalculo=null;

// ================= CALCULAR =================
function calcular(){

let n1=document.getElementById("nombre1").value||"Persona 1";
let n2=document.getElementById("nombre2").value||"Persona 2";

let tu=parseFloat(document.getElementById("tuSueldo").value);
let pareja=parseFloat(document.getElementById("sueldoPareja").value);
let ahorro=parseFloat(document.getElementById("ahorro").value);
let mes=document.getElementById("mes").value;

if(!tu||!pareja||!ahorro){
resultado.innerHTML="⚠️ Rellena todo";
return;
}

let total=tu+pareja;

// 🔥 reparto proporcional sin decimales
let tuA=Math.round(ahorro*(tu/total));
let paA=Math.round(ahorro*(pareja/total));

// 🔧 ajuste para que cuadre EXACTO
let diferencia=ahorro-(tuA+paA);
tuA+=diferencia;

if(tuA>tu||paA>pareja){
resultado.innerHTML="❌ Ahorro demasiado alto";
return;
}

let p1=(tuA/(tuA+paA))*100;
let p2=(paA/(tuA+paA))*100;

ultimoCalculo={mes,n1,n2,tuA,paA};

resultado.innerHTML=`
${n1}: ${tuA}€ (${p1.toFixed(1)}%)<br>
${n2}: ${paA}€ (${p2.toFixed(1)}%)
`;

dibujarGrafico(p1,p2,n1,n2);
}

// ================= GUARDAR =================
function guardar(){

if(!ultimoCalculo||!ultimoCalculo.mes){
alert("Calcula primero");
return;
}

let datos=JSON.parse(localStorage.getItem("ahorros"))||[];

// evitar duplicados
if(datos.some(d=>d.mes===ultimoCalculo.mes)){
alert("❌ Mes ya existe");
return;
}

datos.push(ultimoCalculo);
localStorage.setItem("ahorros",JSON.stringify(datos));

mostrar();
}

// ================= RESET =================
function resetear(){
if(confirm("¿Borrar todo?")){
localStorage.clear();
location.reload();
}
}

// ================= MOSTRAR =================
function mostrar(){

let datos=JSON.parse(localStorage.getItem("ahorros"))||[];

let html="<h3>Historial</h3>";

let t1=0,t2=0;

datos.forEach(d=>{
html+=`${d.mes} → ${d.n1}: ${d.tuA}€ | ${d.n2}: ${d.paA}€<br>`;
t1+=d.tuA;
t2+=d.paA;
});

html+=`<br><b>Totales:</b><br>
${datos[0]?.n1||"P1"}: ${t1}€<br>
${datos[0]?.n2||"P2"}: ${t2}€<br>
Total: ${t1+t2}€`;

document.getElementById("historial").innerHTML=html;
}

// ================= EXPORTAR =================
function exportar(){

let datos=JSON.parse(localStorage.getItem("ahorros"))||[];

let csv="Mes,Nombre1,Aportacion1,Nombre2,Aportacion2\n";

datos.forEach(d=>{
csv+=`${d.mes},${d.n1},${d.tuA},${d.n2},${d.paA}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="ahorros.csv";
a.click();
}

// ================= IMPORTAR =================
function importar(e){

let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(ev){

let lineas=ev.target.result.split("\n");
let datos=[];

for(let i=1;i<lineas.length;i++){
let l=lineas[i].split(",");
if(l.length<5) continue;

datos.push({
mes:l[0],
n1:l[1],
tuA:parseInt(l[2]),
n2:l[3],
paA:parseInt(l[4])
});
}

localStorage.setItem("ahorros",JSON.stringify(datos));
mostrar();
};

reader.readAsText(file);
}

// ================= GRAFICO =================
function dibujarGrafico(p1,p2,n1,n2){

let ctx=document.getElementById("grafico").getContext("2d");

ctx.clearRect(0,0,200,200);

let ang=(p1/100)*2*Math.PI;

ctx.beginPath();
ctx.moveTo(100,100);
ctx.arc(100,100,80,0,ang);
ctx.fillStyle="red";
ctx.fill();

ctx.beginPath();
ctx.moveTo(100,100);
ctx.arc(100,100,80,ang,2*Math.PI);
ctx.fillStyle="blue";
ctx.fill();

ctx.fillStyle="black";
ctx.fillText(n1+" "+p1.toFixed(1)+"%",10,15);
ctx.fillText(n2+" "+p2.toFixed(1)+"%",10,30);
}

// init
mostrar();

</script>

</body>
</html>
