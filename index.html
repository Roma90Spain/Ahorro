<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔥 CLAVE PARA MÓVIL -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ahorro en Pareja</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
    padding:10px;
}

.box {
    background:white;
    padding:15px;
    border-radius:10px;
    width:100%;
    max-width:400px;
    margin:auto;
}

input, button {
    width:100%;
    padding:12px;
    margin:5px 0;
    font-size:16px;
    box-sizing: border-box;
}

button {
    border:none;
    border-radius:5px;
}

.calc{background:#007bff;color:white;}
.save{background:#28a745;color:white;}
.reset{background:#dc3545;color:white;}
.export{background:#6c757d;color:white;}

.resultado{
    margin-top:10px;
    font-weight:bold;
}

.historial{
    margin-top:15px;
    font-size:14px;
}

canvas{
    width:100%;
    max-width:250px;
    display:block;
    margin:15px auto;
}
</style>
</head>

<body>

<div class="box">

<h2>💰 Ahorro en Pareja</h2>

<input id="nombre1" placeholder="Nombre 1">
<input id="nombre2" placeholder="Nombre 2">

<input type="number" id="tuSueldo" placeholder="Sueldo 1 (€)">
<input type="number" id="sueldoPareja" placeholder="Sueldo 2 (€)">
<input type="number" id="ahorro" placeholder="Ahorro objetivo (€)">
<input type="month" id="mes">

<button class="calc" onclick="calcular()">Calcular</button>
<button class="save" onclick="guardar()">Guardar mes</button>
<button class="reset" onclick="resetear()">Reset</button>
<button class="export" onclick="exportar()">Exportar Excel</button>

<input type="file" id="importFile" onchange="importar()">

<div class="resultado" id="resultado"></div>

<canvas id="grafico" width="200" height="200"></canvas>

<div class="historial" id="historial"></div>

</div>

<script>
let ultimoCalculo=null;

function calcular(){

let n1=document.getElementById("nombre1").value||"Persona 1";
let n2=document.getElementById("nombre2").value||"Persona 2";

let tu=parseFloat(document.getElementById("tuSueldo").value);
let pareja=parseFloat(document.getElementById("sueldoPareja").value);
let ahorro=parseFloat(document.getElementById("ahorro").value);
let mes=document.getElementById("mes").value;

let resultado=document.getElementById("resultado");

if(!tu||!pareja||!ahorro){
resultado.innerHTML="⚠️ Rellena todos los campos";
return;
}

let total=tu+pareja;

let tuA=ahorro*(tu/total);
let paA=ahorro*(pareja/total);

if(tuA>tu||paA>pareja){
resultado.innerHTML="❌ Ahorro demasiado alto";
return;
}

let p1=(tuA/(tuA+paA))*100;
let p2=(paA/(tuA+paA))*100;

ultimoCalculo={mes,n1,n2,tuA,paA};

resultado.innerHTML=`
${n1}: ${tuA.toFixed(2)}€ (${p1.toFixed(1)}%)<br>
${n2}: ${paA.toFixed(2)}€ (${p2.toFixed(1)}%)
`;

dibujarGrafico(p1,p2,n1,n2);
}

function guardar(){
if(!ultimoCalculo||!ultimoCalculo.mes){
alert("Calcula primero y selecciona mes");
return;
}

let datos=JSON.parse(localStorage.getItem("ahorros"))||[];
datos.push(ultimoCalculo);
localStorage.setItem("ahorros",JSON.stringify(datos));

mostrar();
}

function resetear(){
if(confirm("¿Borrar todos los datos?")){
localStorage.clear();
document.getElementById("resultado").innerHTML="";
mostrar();
}
}

function mostrar(){

let datos=JSON.parse(localStorage.getItem("ahorros"))||[];

let html="<h3>📊 Historial</h3>";

let t1=0,t2=0;

datos.forEach(d=>{
html+=`${d.mes} → ${d.n1}: ${d.tuA.toFixed(2)}€ | ${d.n2}: ${d.paA.toFixed(2)}€<br>`;
t1+=d.tuA;
t2+=d.paA;
});

html+=`<br><b>Totales acumulados:</b><br>
${datos[0]?.n1||"Persona 1"}: ${t1.toFixed(2)}€<br>
${datos[0]?.n2||"Persona 2"}: ${t2.toFixed(2)}€<br>
Total: ${(t1+t2).toFixed(2)}€`;

document.getElementById("historial").innerHTML=html;
}

function exportar(){

let datos=JSON.parse(localStorage.getItem("ahorros"))||[];

if(datos.length===0){
alert("No hay datos");
return;
}

let csv="Mes,Nombre1,Aportacion1,Nombre2,Aportacion2\n";

datos.forEach(d=>{
csv+=`${d.mes},${d.n1},${d.tuA},${d.n2},${d.paA}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="ahorros.csv";
a.click();
}

function importar(){

let file=document.getElementById("importFile").files[0];
let reader=new FileReader();

reader.onload=function(e){

let texto=e.target.result;
let lineas=texto.split("\n");

let datos=[];

for(let i=1;i<lineas.length;i++){
let l=lineas[i].split(",");
if(l.length<5) continue;

datos.push({
mes:l[0],
n1:l[1],
tuA:parseFloat(l[2]),
n2:l[3],
paA:parseFloat(l[4])
});
}

localStorage.setItem("ahorros",JSON.stringify(datos));
mostrar();
};

reader.readAsText(file);
</body>
</html>
