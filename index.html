<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ahorro en Pareja</title>

<link rel="manifest" href="manifest.json">

<style>
    body {
        font-family: Arial;
        background: #f4f4f4;
        text-align: center;
        padding: 20px;
    }
    .box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 350px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        font-size: 16px;
    }
    button {
        padding: 10px;
        width: 100%;
        background: #007bff;
        color: white;
        border: none;
        font-size: 16px;
        border-radius: 5px;
    }
    .resultado {
        margin-top: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="box">
    <h2>💰 Ahorro en Pareja</h2>

    <input type="number" id="tuSueldo" placeholder="Tu sueldo (€)">
    <input type="number" id="sueldoPareja" placeholder="Sueldo pareja (€)">
    <input type="number" id="ahorro" placeholder="Ahorro objetivo (€)">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
    let tu = parseFloat(document.getElementById("tuSueldo").value);
    let pareja = parseFloat(document.getElementById("sueldoPareja").value);
    let ahorro = parseFloat(document.getElementById("ahorro").value);

    if (!tu || !pareja || !ahorro) {
        resultado.innerHTML = "⚠️ Rellena todos los campos";
        return;
    }

    let total = tu + pareja;

    // Cálculo proporcional
    let tuAportas = ahorro * (tu / total);
    let parejaAporta = ahorro * (pareja / total);

    // Porcentajes
    let tuPorcentaje = (tu / total) * 100;
    let parejaPorcentaje = (pareja / total) * 100;

    // 🚫 No permitir aportar más de lo que se gana
    if (tuAportas > tu || parejaAporta > pareja) {
        resultado.innerHTML = "❌ El ahorro es demasiado alto para vuestros ingresos";
        return;
    }

    // ⚠️ Mensaje si el ahorro es muy exigente (>80% ingresos totales)
    let porcentajeAhorro = (ahorro / total) * 100;
    let aviso = "";

    if (porcentajeAhorro > 80) {
        aviso = "<br>⚠️ Estás intentando ahorrar más del 80% de los ingresos. Puede ser poco realista.";
    }

    resultado.innerHTML = `
        💸 Tú aportas: ${tuAportas.toFixed(2)} € (${tuPorcentaje.toFixed(1)}%)<br>
        💸 Tu pareja aporta: ${parejaAporta.toFixed(2)} € (${parejaPorcentaje.toFixed(1)}%)<br>
        <br>
        💰 Total ahorro: ${(tuAportas + parejaAporta).toFixed(2)} €<br>
        ${aviso}
    `;
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
